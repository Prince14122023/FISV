<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIS PRO | Industrial Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #ff4d4d; --green: #2ecc71; --bg: #f1f5f9; 
            --accent: #2563eb; --card-bg: #ffffff; --dark-card: #1e293b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background: var(--bg); color: #334155; overflow-x: hidden; min-height: 100vh; }
        
        /* Premium Header */
        header { 
            background: var(--accent); padding: 0.8rem 1.5rem; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            color: white;
        }
        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { background: white; color: var(--accent); padding: 2px 8px; border-radius: 6px; margin-left: 5px; font-size: 0.8rem; }

        /* Navigation */
        .category-tabs { display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .tab { 
            padding: 0.5rem 1rem; font-size: 0.7rem; font-weight: 600; cursor: pointer; 
            border-radius: 50px; transition: 0.3s; color: rgba(255,255,255,0.8); 
            border: 1px solid rgba(255,255,255,0.2); white-space: nowrap;
        }
        .tab.active { background: white; color: var(--accent); }

        /* Hero Slider */
        .hero-section { width: 100%; position: relative; height: 350px; background: #000; overflow: hidden; }
        .slider-container { display: flex; height: 100%; transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .hero-content { position: absolute; bottom: 40px; left: 20px; color: white; z-index: 10; }
        .hero-content h1 { font-size: 1.8rem; font-weight: 800; line-height: 1.1; }

        /* Action Bar */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem 5rem; }
        .action-bar { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; 
            margin-top: -40px; z-index: 20; position: relative;
        }
        .action-card { 
            background: var(--dark-card); border-radius: 20px; padding: 1.5rem; 
            cursor: pointer; transition: 0.3s; color: white; text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .action-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .action-icon { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--accent); }

        /* Results Grid */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #e2e8f0; }
        .card.is-hidden { display: none; }
        .viewport { background: #eee; aspect-ratio: 4/3; position: relative; }
        .viewport img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-content { padding: 1.2rem; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.65rem; font-weight: 800; margin-bottom: 0.5rem; }
        .status-pass { background: #dcfce7; color: #15803d; }
        .status-fail { background: #fee2e2; color: #b91c1c; }
        .defect-title { font-weight: 800; font-size: 1rem; color: #1e293b; margin-bottom: 0.3rem; }
        .briefing-text { font-size: 0.75rem; color: #64748b; line-height: 1.4; }
        
        .confidence-mini { margin-top: 1rem; padding-top: 0.8rem; border-top: 1px dashed #e2e8f0; display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 700; color: var(--accent); }

        @media (max-width: 600px) {
            .hero-section { height: 250px; }
            .hero-content h1 { font-size: 1.4rem; }
            header { padding: 0.8rem 1rem; }
            .category-tabs { margin-top: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">FIS <span>PRO</span></div>
    <div class="category-tabs" id="navTabs">
        <div class="tab active" data-cat="all" onclick="filterGallery('all')">ALL</div>
        <div class="tab" data-cat="knot" onclick="filterGallery('knot')">KNOTS</div>
        <div class="tab" data-cat="warp" onclick="filterGallery('warp')">WARP</div>
        <div class="tab" data-cat="hole" onclick="filterGallery('hole')">HOLES</div>
        <div class="tab" data-cat="good" onclick="filterGallery('good')">OPTIMAL</div>
    </div>
</header>

<div class="hero-section">
    <div class="slider-container" id="slider">
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1558273109-60434068ec39?auto=format&fit=crop&q=80" alt="Fabric">
            <div class="hero-content"><h1>Autonomous Fabric Pathological Scanner</h1></div>
        </div>
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?auto=format&fit=crop&q=80" alt="Weave">
            <div class="hero-content"><h1>Real-time Surface Integrity Audit</h1></div>
        </div>
    </div>
</div>

<div class="container">
    <div class="action-bar">
        <div class="action-card" onclick="document.getElementById('fileInput').click()">
            <div class="action-icon">📸</div>
            <div class="action-title">SCAN MATERIAL</div>
            <p style="font-size: 0.75rem; opacity: 0.7;">Upload fabric images for AI defect analysis</p>
        </div>
        <input type="file" id="fileInput" hidden multiple onchange="handleUploads(this)">
    </div>

    <div id="resultsGrid" class="results-grid"></div>
    <div style="text-align:center; margin-top: 2rem;">
        <button id="clearBtn" onclick="location.reload()" style="display:none; background:none; border:none; color:#b91c1c; font-weight:800; cursor:pointer; font-size:0.8rem;">🗑️ CLEAR AUDIT LOG</button>
    </div>
</div>

<script>
    // Slider Logic
    let idx = 0;
    setInterval(() => {
        idx = (idx + 1) % 2;
        document.getElementById('slider').style.transform = `translateX(-${idx * 100}%)`;
    }, 4000);

    async function handleUploads(input) {
        if (!input.files.length) return;
        document.getElementById('clearBtn').style.display = 'inline-block';
        
        for (const file of input.files) {
            const cardId = 'c-' + Math.random().toString(36).substr(2, 5);
            addPlaceholder(cardId, file);
            await uploadFile(file, cardId);
        }
    }

    function addPlaceholder(id, file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const html = `<div class="card" id="${id}" data-category="all">
                <div class="viewport"><img src="${e.target.result}"></div>
                <div class="card-content">
                    <div class="status-badge" style="background:#f1f5f9; color:#64748b;">ANALYZING...</div>
                    <div class="defect-title">Processing AI...</div>
                    <p class="briefing-text">The system is scanning for structural breaches and density anomalies.</p>
                </div>
            </div>`;
            document.getElementById('resultsGrid').insertAdjacentHTML('afterbegin', html);
        };
        reader.readAsDataURL(file);
    }

    async function uploadFile(file, id) {
        const fd = new FormData(); fd.append('file', file);
        try {
            const res = await fetch('https://fisv.vercel.app/api/analyze-frame', { method: 'POST', body: fd });
            const data = await res.json();
            
            const card = document.getElementById(id);
            const isPass = data.status === 'PASS';
            
            // Map categories based on results
            let cat = 'good';
            if (!isPass) {
                if (data.defect_type.includes('KNOT')) cat = 'knot';
                else if (data.defect_type.includes('WARP')) cat = 'warp';
                else if (data.defect_type.includes('HOLE')) cat = 'hole';
            }

            card.setAttribute('data-category', cat);
            card.querySelector('.viewport img').src = data.image || card.querySelector('.viewport img').src;
            card.querySelector('.status-badge').className = `status-badge ${isPass ? 'status-pass' : 'status-fail'}`;
            card.querySelector('.status-badge').innerText = data.status;
            card.querySelector('.defect-title').innerText = data.defect_type;
            card.querySelector('.briefing-text').innerText = data.briefing;
            card.querySelector('.card-content').insertAdjacentHTML('beforeend', 
                `<div class="confidence-mini"><span>ACCURACY</span><span>${data.accuracy}%</span></div>`);
            
        } catch (e) {
            console.error(e);
        }
    }

    function filterGallery(cat) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
        document.querySelectorAll('.card').forEach(c => {
            c.classList.toggle('is-hidden', cat !== 'all' && c.dataset.category !== cat);
        });
    }
</script>
</body>
</html>
